            "name": "UnitMatrix",
            "alternateName": "Universal Unit Converter",
            "description": "A fast, accurate, privacy-friendly unit converter for length, area, volume, mass, temperature, time, speed, pressure, energy, power, force, torque, voltage, current, frequency, data storage, resistance, density, fuel economy, flow, luminance, radioactivity, viscosity and data rate.",
            "url": "https://unitmatrix.net",
            "applicationCategory": "UtilityApplication",
            "operatingSystem": "All",
            "inLanguage": ["en","de","es","fr","nl","pl","pt","ru","tr","uk","ja","zh"],
            "featureList": "Length, Area, Volume, Mass, Temperature, Time, Speed, Pressure, Energy, Power, Force, Torque, Voltage, Current, Frequency, Data Storage, Resistance, Density, Fuel Economy, Flow, Luminance, Radioactivity, Viscosity, Data Rate",
            "offers": {
                "@type": "Offer",
                "price": "0.00",
                "priceCurrency": "EUR"

        }

    <!-- CSS + fonts -->
    <link rel="stylesheet" href="assets/css/style.css">

            <p class="tagline">All Units. One Matrix.</p>
        </div>

        <div class="header-right">
            <div class="lang-select-wrapper">
                <label for="languageSelect" class="sr-only">Language</label>
                <select id="languageSelect" class="lang-select">
                </select>
            </div>
            <div class="theme-select-wrapper">
                <label for="themeSelect" class="sr-only">Theme</label>
                <select id="themeSelect" class="theme-select">
                </select>
            </div>
        </div>
    </header>

    <main class="main" role="main">
        <!-- Left Panel: Converter -->
        <section class="panel converter-panel">
            <h1 id="categoryTitle">Length</h1>
            <div class="converter-box">
                <label for="unitFrom">From</label>
                <select id="unitFrom"></select>

                <label for="inputValue" class="sr-only">Input value</label>
                <input type="text" inputmode="decimal" id="inputValue" value="1">

                <label for="unitTo">To</label>
                <select id="unitTo"></select>

                <label for="outputValue" class="sr-only">Output value</label>
                <input type="text" id="outputValue" readonly>

                <div class="converter-actions">
                    <div class="converter-actions-right">
                        <button type="button" id="copyResultBtn" class="copy-btn">
                            Copy result
                        </button>
                        <button
                                type="button"
                                id="swapUnitsBtn"
                                class="swap-btn"
                                aria-label="Swap units">
                            ⇅
                        </button>
                    </div>
                </div>

                <div id="conversionSummary" class="conversion-summary"></div>
                <p id="belowAbsZeroWarn" class="below-abs-zero-warn" hidden></p>
            </div>
        </section>

        <!-- Right Panel: Unit Matrix -->
        <section class="panel unitmatrix-panel">
            <div class="matrix-main">
                <div class="unitmatrix-grid"></div>

                <button class="matrix-toggle" type="button" aria-expanded="false" aria-controls="unitmatrix-extra">More units&hellip;</button>
            </div>

            <div class="unitmatrix-extra" id="unitmatrix-extra" hidden></div>
        </section>
    </main>

    <footer class="footer">
        <div id="footerSupport"></div>
        <div id="footerLinks">
            <a href="#" id="aboutLink"></a>
            <span aria-hidden="true"> · </span>
            <a href="/impressum.html" id="impressumLink"></a>
            <span aria-hidden="true"> · </span>
            <a href="/datenschutz.html" id="privacyLink"></a>
            <span aria-hidden="true"> · </span>
            <a href="https://github.com/stefanradermacher/unitmatrix" target="_blank" rel="noopener">GitHub</a>
            <span aria-hidden="true"> · </span>
            <span>&copy; 2026 UnitMatrix</span>
        </div>
    </footer>

    <!-- About Modal -->
    <div id="aboutModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="aboutModalTitle">
            <button type="button" class="modal-close" aria-label="Close about dialog" data-modal-close>
                &times;
            </button>
            <h2 id="aboutModalTitle"></h2>
            <div id="aboutModalBody"></div>
        </div>
    </div>

    <!-- Privacy Modal -->
    <div id="privacyModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="privacyModalTitle">
            <button type="button" class="modal-close" aria-label="Close privacy dialog" data-modal-close>
                ×
            </button>
            <h2 id="privacyModalTitle"></h2>
            <div id="privacyModalBody"></div>
        </div>
    </div>

    <!-- Support / Donate Modal -->
    <div id="supportModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="supportModalTitle">
            <button type="button" class="modal-close" aria-label="Close support dialog" data-modal-close>
                ×
            </button>
            <h2 id="supportModalTitle"></h2>
            <div id="supportModalBody"></div>
        </div>
    </div>

    <!-- Impressum / Legal Notice Modal -->
    <div id="impressumModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="impressumModalTitle">
            <button type="button" class="modal-close" aria-label="Close legal notice dialog" data-modal-close>
                ×
            </button>
            <h2 id="impressumModalTitle"></h2>
            <div id="impressumModalBody"></div>
        </div>
    </div>
